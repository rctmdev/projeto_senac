<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>

    <div>
        <h1> Exemplo de tag de formulário </h1>
        <h2> peencher todos os campos obrigatórios * </h2>

        <form action="" method="get">
            <fieldset>

                <legend> Dados Pessoais (<strong> Inputs mais importates </strong>)</legend>

                <label for="nome"> * Nome: </label>
                <input type="text" id="nome" name="none" autofocus minlength="3" /> <br>

                <label for="email"> * E-mail: </label>
                <input type="email" id="email" name="email" required placeholder="exemplo@mail.com" />
                <br>

                <label for="contato"> Contato: </label>
                <input type="tel" id="contato" name="contato" maxlength="11" [0-9] {2} [0-9] {5} [0-9] {4}
                    placeholder="(xx) xxxxx-xxxx" /> <br>

                <label for="senha"> * Senha: </label>
                <input type="password" id="senha" name="senha" required minlength="4" maxlength="12" /> <br>

                <label for="busca"> 🔎 </label>
                <input type="search" id="busca" name="busca" placeholder="O que deseja buscar?" /> <br>

                <label for="busca"> Número </label>
                <input type="number" id="numero" name="numero" min="0" max="100" /> <br>

            </fieldset>

            <fieldset>
                <legend> Inputs especiais </legend>

                <label for="selecao"> Caixa de seleção </label>
                <select id="selecao" name="selecao">
                    <option value="0"> Selecione </option>
                    <option value="1"> RN </option>
                    <option value="2"> PB </option>
                    <option value="3"> PR </option>
                    <option value="4"> CE </option>
                    <option value="5"> AL </option>
                </select> <br>

                <label for="area"> Área de texto </label>
                <textarea id="area" name="area" placeholder="Digite sua menssagem aqui..." cols="50" rows="4"></textarea> <br>

                <label for="genero"> Gênero </label>
                <input type="radio" id="genero" name="genero" value="M"/> Masculino <input type="radio" id="genero" name="genero" value="F" /> Feminino <input type="radio" id="genero" name="genero" value="U" /> Prefiro não informar <br>

                <label for="check"> Checkbox de preferências: </label><br>
                <input type="checkbox" id="check" name="check" value="0" checked disabled/> Leitura <br>
                <input type="checkbox" id="check" name="check" value="1"/> Cinema <br>
                <input type="checkbox" id="check" name="check" value="2"/> Praia <br>
                <input type="checkbox" id="check" name="check" value="3"/> Teatro <br>
                <input type="checkbox" id="check" name="check" value="4"/> Passeio <br>
                

            </fieldset>

            <fieldset>
                <legend> Outros campos (<strong> Inputs importantes, mas menos utilizados</strong>) </legend>

                <label for="data"> Data: </label>
                <input type="date" id="data" name="data" />

                <label for="hora"> Hora: </label>
                <input type="time" id="hora" name="hora" /> <br>

                <label for="datahora"> Data e hora: </label>
                <input type="datetime-local" id="datahora" name="datahora" /> <br>

                <label for="semana"> Semana: </label>
                <input type="week" id="semana" name="semana" /> <br>

                <label for="linksite"> Campo específico para links: </label>
                <input type="url" id="linksite" name="linksite" /><br>

                <label for="cor"> Color Picker: </label>
                <input type="color" id="cor" name="cor" /> <br>

                <input type="file" id="arquivo" name="arquivo" accept=".doc, .pdf, .png, .rar, .zip" /> <br>

                <label for="ranger"> Ranger: </label>
                0 <input type="range" id="ranger" name="ranger" min="0" max="100" value="50"/> 100 <br>




            </fieldset>

            <input type="reset" value="Limpar campos"/>
            <input type="submit" value="Enviar dados"/>

        </form>

    </div>

</body>

</html>
